<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AhorrosPlus - ¿Conviene comprar ahora?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f7f9fb; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-family: 'Material Symbols Outlined'; }
        .card-in { animation: cardIn 0.35s ease-out both; }
        @keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-8">
<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
        <span class="material-symbols-outlined text-blue-600 text-xl">search</span>
        <input id="search-input" type="text"
            class="flex-grow bg-slate-100 border-none rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all"
            placeholder="¿Qué querés comprar?">
        <button id="search-button"
            class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-wide transition-all active:scale-95 whitespace-nowrap shadow-md shadow-blue-200">
            Buscar
        </button>
    </div>
</header>
<main class="pt-20 pb-6 px-4 max-w-2xl mx-auto space-y-5">
    <div id="hero" class="flex flex-col items-center justify-center text-center pt-8 pb-4">
        <h1 class="font-headline font-black text-3xl text-blue-700 tracking-tight">Ahorros<span class="text-slate-800">Plus</span></h1>
        <p class="text-slate-500 text-sm mt-1">¿Es oferta real o te están clavando?</p>
        <div class="mt-6 grid grid-cols-3 gap-3 w-full max-w-sm">
            <div class="bg-white rounded-xl p-3 text-center shadow-sm border border-slate-100">
                <span class="material-symbols-outlined text-emerald-500 text-2xl">trending_down</span>
                <p class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-wide">Precio mínimo</p>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm border border-slate-100">
                <span class="material-symbols-outlined text-blue-500 text-2xl">local_shipping</span>
                <p class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-wide">Envío gratis</p>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm border border-slate-100">
                <span class="material-symbols-outlined text-amber-500 text-2xl">verified</span>
                <p class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-wide">Vendedor top</p>
            </div>
        </div>
        <p class="text-slate-400 text-xs mt-5 italic">Buscá un producto para ver el análisis</p>
    </div>
    <div id="veredicto" class="hidden"></div>
    <div id="product-list"></div>
</main>
<script>
const input = document.getElementById('search-input');
const btn   = document.getElementById('search-button');
const list  = document.getElementById('product-list');
const hero  = document.getElementById('hero');
const vered = document.getElementById('veredicto');

// El backend YA agrega el affiliate tag — no lo agregamos de nuevo acá
function safeLink(permalink) {
    if (!permalink || permalink === 'undefined') return '#';
    return permalink;
}

async function buscar() {
    const q = input.value.trim();
    if (!q) return;
    hero.classList.add('hidden');
    vered.classList.add('hidden');
    btn.innerText = "...";
    btn.disabled = true;
    list.innerHTML = `<div class="flex flex-col items-center justify-center py-16">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-3"></div>
        <p class="text-blue-600 font-bold text-xs tracking-widest uppercase">Analizando precios...</p></div>`;
    try {
        const res  = await fetch('/api/buscar?q=' + encodeURIComponent(q));
        const data = await res.json();
        if (data.error) throw new Error(data.error + (data.message ? ': ' + data.message : ''));
        if (!Array.isArray(data) || data.length === 0) {
            list.innerHTML = `<div class="text-center py-16 bg-white rounded-2xl border border-dashed border-slate-200">
                <span class="material-symbols-outlined text-slate-300 text-4xl">search_off</span>
                <p class="text-slate-500 font-semibold mt-2">Sin resultados para "<strong>${q}</strong>"</p></div>`;
            return;
        }
        // Solo usamos productos con precio para el veredicto
        const conPrecio = data.filter(p => p.price);
        if (conPrecio.length >= 2) renderVeredicto(conPrecio, q);
        renderProductos(data);
    } catch(e) {
        list.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl border border-red-100">
            <span class="material-symbols-outlined text-red-400 text-3xl">error</span>
            <p class="font-bold text-red-500 mt-2">Error de conexión</p>
            <p class="text-xs text-red-400 mt-1">${e.message}</p></div>`;
    } finally { btn.innerText = "Buscar"; btn.disabled = false; }
}

function renderVeredicto(productos, q) {
    const precios = productos.map(p => p.price).sort((a,b) => a-b);
    const min  = precios[0];
    const max  = precios[precios.length-1];
    const prom = precios.reduce((a,b) => a+b, 0) / precios.length;
    const spread = prom > 0 ? ((max-min)/prom*100).toFixed(0) : 0;
    const gratis = productos.some(p => p.shipping?.free_shipping);
    let color, titulo, sub;
    if (spread < 10)      { color='emerald'; titulo='✅ Precios estables';       sub='El más barato es una oferta consistente.'; }
    else if (spread < 35) { color='amber';   titulo='⚠️ Revisá antes de comprar'; sub=`Hay ${spread}% de diferencia entre vendedores.`; }
    else                  { color='red';     titulo='🚨 Mucha diferencia';        sub=`${spread}% de diferencia. Algún vendedor está inflando el precio.`; }
    const fmt = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n);
    vered.classList.remove('hidden');
    vered.innerHTML = `<div class="bg-white rounded-2xl p-4 shadow-sm border-l-4 border-${color}-500 card-in">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Análisis de "${q}"</p>
        <h2 class="font-headline font-extrabold text-base text-${color}-600">${titulo}</h2>
        <p class="text-xs text-slate-500 mt-1">${sub}</p>
        <div class="grid grid-cols-3 gap-2 mt-3">
            <div class="bg-slate-50 rounded-xl p-2 text-center"><p class="text-[9px] text-slate-400 uppercase font-bold">Mínimo</p><p class="font-headline font-extrabold text-sm text-emerald-600">${fmt(min)}</p></div>
            <div class="bg-slate-50 rounded-xl p-2 text-center"><p class="text-[9px] text-slate-400 uppercase font-bold">Promedio</p><p class="font-headline font-extrabold text-sm text-blue-600">${fmt(prom)}</p></div>
            <div class="bg-slate-50 rounded-xl p-2 text-center"><p class="text-[9px] text-slate-400 uppercase font-bold">Máximo</p><p class="font-headline font-extrabold text-sm text-red-500">${fmt(max)}</p></div>
        </div>
        ${gratis?`<div class="mt-2 flex items-center gap-1 text-emerald-600 text-xs font-bold"><span class="material-symbols-outlined text-sm">local_shipping</span> Hay opciones con envío gratis</div>`:''}
    </div>`;
}

function renderProductos(productos) {
    const fmt = n => n ? new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n) : 'Ver precio';
    const minP = productos.find(p => p.price)?.price;
    list.innerHTML = `
        <div class="flex items-center justify-between mb-2">
            <h3 class="font-headline font-bold text-base">Mejores opciones</h3>
            <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full">Top ${productos.length}</span>
        </div>
        <div class="space-y-3">
        ${productos.map((p,i) => {
            const esMin = p.price && p.price === minP;
            const titulo = (p.title||'Sin título').substring(0,58) + ((p.title||'').length > 58 ? '...' : '');
            const link = safeLink(p.permalink);
            return `<div class="bg-white rounded-2xl p-3.5 flex gap-3.5 items-center shadow-sm hover:shadow-md transition-all card-in border ${esMin?'border-emerald-200':'border-slate-100'}" style="animation-delay:${i*0.07}s">
                <div class="w-16 h-16 flex-shrink-0 bg-slate-50 rounded-xl overflow-hidden flex items-center justify-center">
                    <img src="${p.thumbnail||''}" class="w-full h-full object-contain mix-blend-multiply" alt="${titulo}" onerror="this.parentElement.innerHTML='<span class=\\'material-symbols-outlined text-slate-300 text-2xl\\'>image_not_supported</span>'">
                </div>
                <div class="flex-grow min-w-0">
                    ${esMin?'<span class="inline-block bg-emerald-500 text-white text-[8px] font-black px-2 py-0.5 rounded-full uppercase tracking-wide mb-1">Mejor precio</span>':''}
                    <p class="text-xs font-semibold text-slate-700 leading-tight">${titulo}</p>
                    <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                        <span class="font-headline font-extrabold text-lg ${esMin?'text-emerald-600':'text-blue-600'}">${fmt(p.price)}</span>
                        ${p.shipping?.free_shipping?'<span class="text-[9px] bg-emerald-50 text-emerald-600 border border-emerald-200 px-1.5 py-0.5 rounded-full font-bold uppercase">Envío gratis</span>':''}
                    </div>
                </div>
                <a href="${link}" target="_blank" rel="noopener"
                    class="flex-shrink-0 bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold px-3 py-2 rounded-xl transition-all active:scale-90 shadow-sm whitespace-nowrap ${link==='#'?'opacity-50 pointer-events-none':''}">
                    Ver oferta
                </a>
            </div>`;
        }).join('')}
        </div>`;
}

btn.addEventListener('click', buscar);
input.addEventListener('keypress', e => { if(e.key==='Enter') buscar(); });
</script>
</body>
</html>
